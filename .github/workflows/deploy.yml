name: Deploy MDO Attack Simulation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required for checkout

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-mdo-attack-simulation' }}
  AZURE_REGION: 'westus2'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_REGION }} \
            --tags project=MDOAttackSimulation environment=production

      - name: Deploy Infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query "properties.outputs" \
            --output json > deployment_outputs.json

          cat deployment_outputs.json

      - name: Wait for RBAC Propagation
        run: |
          echo "Waiting 60 seconds for RBAC role assignments to propagate..."
          sleep 60

      - name: Get Function App Name
        id: get-names
        run: |
          FUNCTION_APP_NAME=$(cat deployment_outputs.json | jq -r '.functionAppName.value')
          echo "function_app_name=${FUNCTION_APP_NAME}" >> $GITHUB_OUTPUT
          echo "Function App: ${FUNCTION_APP_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'src/function_app/requirements.txt'

      - name: Install Azure Functions Core Tools
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo mv microsoft.gpg /etc/apt/trusted.gpg.d/microsoft.gpg
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-$(lsb_release -cs)-prod $(lsb_release -cs) main" > /etc/apt/sources.list.d/dotnetdev.list'
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Deploy Function Code
        run: |
          cd src/function_app
          func azure functionapp publish ${{ steps.get-names.outputs.function_app_name }} --python

      - name: Generate Deployment Summary
        if: success()
        run: |
          echo "## Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Function App**: ${{ steps.get-names.outputs.function_app_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.AZURE_RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AZURE_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Azure Logout
        if: always()
        run: az logout
