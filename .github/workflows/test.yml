name: Tests & Quality

on:
  pull_request:
    branches: [main, public-release]
  push:
    branches: [main, public-release]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            src/function_app/requirements.txt
            src/function_app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/function_app/requirements.txt
          pip install -r src/function_app/requirements-dev.txt

      - name: Lint with ruff
        run: |
          cd src/function_app
          ruff check .

      - name: Type check with mypy
        run: |
          cd src/function_app
          mypy config.py utils/ processors/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          cd src/function_app
          python -m pytest ../../tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/src/function_app

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/function_app/coverage.xml

      - name: Check dependencies for vulnerabilities
        run: pip-audit -r src/function_app/requirements.txt
        continue-on-error: true
